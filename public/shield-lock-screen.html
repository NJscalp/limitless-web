                  </span>
                  <div class="lk-blocked-text">
                    <span class="lk-blocked-name" id="blocked-app">TikTok</span>
                    <span class="lk-blocked-tag">Blocked</span>
                  </div>
                </div>
                <div class="lk-divider" aria-hidden="true"></div>
                <!-- Unlock-Task Eyebrow + App-Card (wie UnlockTaskListRow aus der Limitless-App) -->
                <p class="lk-eyebrow">
                  <span>Unlock Task</span>
                </p>
                <div class="lk-task-now">
                  <span class="lk-task-icon" id="task-icon" aria-hidden="true"></span>
                  <div class="lk-task-body">
                    <h1 class="lk-task-title" id="task-name">Fish Face</h1>
                    <span class="lk-task-meta">
                      <b id="task-meta-seconds">25 sec</b>
                      <span> · Face Workout</span>
                    </span>
                  </div>
                  <span class="lk-task-chev" aria-hidden="true">
                    <svg viewBox="0 0 10 16" fill="none">
                      <path d="M3 2 L7 8 L3 14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>
                </div>
              </div>
            </div>

            <!-- APP CTA: unser Limitless App-Store-Card -->
            <a class="lk-appstore-card" id="lk-appstore-card"
               href="https://apps.apple.com/app/limitless-app-blocker/id0000000000"
               target="_blank" rel="noopener" aria-label="Limitless on the App Store">
              <img src="./assets/app-store-card.png" alt="Limitless on the App Store"
                   width="1024" height="406" decoding="async" loading="eager" />
            </a>

            <!-- LIMITLESS RATING: Halbkreis-Gauge mit Zahl im Zentrum + Tier-Label fett darunter -->
            <div class="lk-psl" id="psl-strip">
              <span class="lk-psl-head-label">Limitless Rating</span>
              <div class="lk-psl-gauge-wrap">
                <svg class="lk-psl-gauge" viewBox="0 0 200 116" aria-hidden="true">
                  <defs>
                    <linearGradient id="psl-gauge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop id="psl-grad-0"   offset="0%"   stop-color="#7fd0ff" />
                      <stop id="psl-grad-100" offset="100%" stop-color="#b3e0ff" />
                    </linearGradient>
                    <filter id="psl-gauge-glow" x="-30%" y="-30%" width="160%" height="160%">
                      <feGaussianBlur stdDeviation="3.2" result="coloredBlur" />
                      <feMerge>
                        <feMergeNode in="coloredBlur" />
                        <feMergeNode in="SourceGraphic" />
                      </feMerge>
                    </filter>
                  </defs>
                  <!-- Track (Hintergrund-Linie) -->
                  <path class="lk-psl-gauge-track"
                        d="M 18 100 A 82 82 0 0 1 182 100" />
                  <!-- Fill (Tier-Gradient, Glow) -->
                  <path class="lk-psl-gauge-fill" id="psl-gauge-fill"
                        d="M 18 100 A 82 82 0 0 1 182 100" />
                </svg>
                <div class="lk-psl-center">
                  <span class="lk-psl-num" id="psl-num">7</span>
                  <span class="lk-psl-denom">/10</span>
                </div>
              </div>
              <span class="lk-psl-tier-pill" id="psl-tier-pill">MTN</span>
            </div>
            <span id="psl-boxes" hidden></span>
            <span id="psl-bar" hidden></span>

            <!-- CHAD-TIER GRID: 6 Kategorien mit 1–10 + Chad-Label -->
            <div class="lk-chad-grid" id="chad-grid" aria-label="Looksmax categories"></div>

            <!-- Hidden Kompat-Elemente für bestehende JS-Pipeline (Score/Potential als Spans) -->
            <span id="score-val" hidden>72</span>
            <span id="potential-val" hidden>86</span>
            <span id="score-delta" hidden>+14</span>
            <div id="scan-traj" hidden>
              <div id="traj-fill"></div>
              <div id="traj-dot"></div>
            </div>
            <div class="shield-scan-empty" id="scan-empty" hidden></div>
            <div class="shield-scan-filled" id="scan-filled" hidden></div>
            <div id="scan-mock" hidden></div>
            <div id="scan-ring" hidden></div>
            <div id="shield-scan-wrap" hidden></div>
            <span id="shield-scan-hit" hidden></span>
            <span id="lk-def-chip" hidden></span>
            <span id="lk-stats" hidden></span>
            <span id="task-seconds" hidden></span>
            <div id="hero-icon" hidden></div>
            <p class="shield-sub" id="task-sub" hidden></p>
            <p class="shield-scan-status" id="scan-status" hidden></p>

            <!-- Footer -->
            <p class="shield-appstore-footer" aria-label="Limitless on the App Store">
              <span class="shield-appstore-footer-brand">Limitless</span>
              <span class="shield-appstore-footer-sep" aria-hidden="true">·</span>
              <span class="shield-appstore-footer-text">Available on the App&nbsp;Store</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Kompaktes Edit-Panel unter dem Handy: Foto wechseln + Task wählen + Ratings bearbeiten -->
  <aside class="edit-panel" aria-label="Ratings bearbeiten">

  function isLikelyShieldBackgroundPixel(r, g, b, a) {
    if (a < 12) return true;
    var sum = r + g + b;
    if (sum >= 735) return true;
    if (sum >= 680) {
      var dr = Math.abs(r - g);
      var dg = Math.abs(g - b);

  var CREAM_R = 252;

  /**
   * Ersetzt helle/weiße Hintergrundpixel durch exakt Cream (#fcf9ef), wie im App-Bundle.
   * @param {HTMLImageElement} img
   * @param {number} maxDim max. Kantenlänge (Performance)
   * @param {function(string|null)} done data URL oder null bei Fehler
   */
  function flattenPngToShieldCream(img, maxDim, done) {
    var w0 = img.naturalWidth;
    var h0 = img.naturalHeight;
    if (!w0 || !h0) {
      done(null);
      return;
    }
    var scale = Math.min(1, maxDim / Math.max(w0, h0));
    var cw = Math.max(1, Math.round(w0 * scale));
    var ch = Math.max(1, Math.round(h0 * scale));
    var canvas = document.createElement('canvas');
    canvas.width = cw;
    canvas.height = ch;
    var ctx = canvas.getContext('2d');
    if (!ctx) {
      done(null);
      return;
    }
    try {
      ctx.drawImage(img, 0, 0, cw, ch);
      var imageData = ctx.getImageData(0, 0, cw, ch);
      var d = imageData.data;
      for (var i = 0; i < d.length; i += 4) {
        var r = d[i];
        var g = d[i + 1];
        var b = d[i + 2];
        var a = d[i + 3];
        if (isLikelyShieldBackgroundPixel(r, g, b, a)) {
          d[i] = CREAM_R;
          d[i + 1] = CREAM_G;
          d[i + 2] = CREAM_B;
          d[i + 3] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);
      done(canvas.toDataURL('image/png'));
    } catch (e) {
      done(null);
    }
  }

  function applyShieldCreamToImage(img, maxDim) {

  function limitlessScoreTierRgb(score) {
    var t = Math.max(0, Math.min(100, score)) / 100;
    var r = Math.round((1 * (1 - t) + 0 * t) * 255);
    var g = Math.round((0.58 * (1 - t) + 0.48 * t) * 255);
    var b = Math.round((0 * (1 - t) + 1 * t) * 255);
    return { r: r, g: g, b: b };

  function num(v) {
    if (v == null) return null;
    if (typeof v === 'number' && !isNaN(v)) return v;
    if (typeof v === 'string' && v.trim() !== '') {
      var x = Number(v);
      return isNaN(x) ? null : x;
    }
    return null;
  }

  function scoreClamp30_90(v) {
    return Math.max(30, Math.min(90, Math.round(v)));
  }

  function applyDisplayCaps(overallRaw, potentialRaw) {
    var overall = Math.min(99, Math.max(0, Math.round(overallRaw)));
    var potential = Math.min(100, Math.max(0, Math.round(potentialRaw)));
    potential = Math.max(potential, overall);
    return { overall: overall, potential: potential };
  }

  function mapScoresFromAnalysisRecord(a) {
    var overallRaw = num(a.overallScore);

      if (lm != null) overallRaw = lm * 10;
      else overallRaw = num(a.landmarkStructuralOverall) != null ? num(a.landmarkStructuralOverall) : 55;

    overallRaw = scoreClamp30_90(overallRaw);
    var potentialRaw = num(a.potentialScore);
    if (potentialRaw == null) {
      var lmp = num(a.looksmaxPotential);
      if (lmp != null) {
        potentialRaw = scoreClamp30_90(Math.round(lmp * 10));

        potentialRaw = scoreClamp30_90(Math.max(overallRaw + 4, 58));
      }
    } else {
      potentialRaw = scoreClamp30_90(potentialRaw);

    potentialRaw = scoreClamp30_90(Math.max(potentialRaw, overallRaw));
    return applyDisplayCaps(overallRaw, potentialRaw);

  function numLike(v) {
    if (typeof v === 'number' && !isNaN(v)) return true;
    if (typeof v === 'string' && v.trim() !== '' && !isNaN(Number(v))) return true;
    return false;
  }

  function extractAnalysisRecord(raw) {
    if (raw == null || typeof raw !== 'object') return null;
    var o = raw;
    var inner = o.analysis;
    if (inner == null && o.data != null && typeof o.data === 'object') {
      inner = o.data.analysis;
    }
    if (typeof inner === 'string') {
      try {
        inner = JSON.parse(inner);
      } catch (e) {
        inner = null;
      }
    }
    if (inner && typeof inner === 'object') {
      return flattenKeys(inner);
    }
    if (numLike(o.overallScore) || numLike(o.potentialScore) || numLike(o.jawlineDefinition)) {
      return flattenKeys(o);
    }
    return null;
  }

  function deriveDemoScoresFromFile(file) {
    return file.slice(0, 65536).arrayBuffer().then(function (buf) {
      var u8 = new Uint8Array(buf);
      var h = 2166136261;
      for (var i = 0; i < u8.length; i++) {
        h ^= u8[i];
        h = Math.imul(h, 16777619);
      }
      function rnd(shift) {
        return scoreClamp30_90(32 + (((h >>> shift) & 0xff) % 52));
      }
      var overallRaw = rnd(0);
      var potentialRaw = scoreClamp30_90(overallRaw + 2 + ((h >>> 4) & 0x0f));
      potentialRaw = scoreClamp30_90(Math.max(potentialRaw, overallRaw));
      return applyDisplayCaps(overallRaw, potentialRaw);
    });
  }

  function sleep(ms) {
    return new Promise(function (resolve) {
      setTimeout(resolve, ms);
    });
  }

  function shouldRetryHttpStatus(status) {
    return status >= 500 || status === 429 || status === 408;
  }

  function readFileAsBase64Data(file) {
    return new Promise(function (resolve, reject) {
      var r = new FileReader();
      r.onload = function () {
        var x = r.result;
        if (typeof x !== 'string') {
          reject(new Error('read_failed'));
          return;
        }
        var comma = x.indexOf(',');
        resolve(comma >= 0 ? x.slice(comma + 1) : x);
      };
      r.onerror = function () {
        reject(r.error);
      };
      r.readAsDataURL(file);
    });
  }

  function analyzeImageFile(file) {
    return readFileAsBase64Data(file).then(function (b64) {
      var attempts = 4;
      var delay = 500;
      function tryOnce(attempt) {
        return fetch('/api/face-analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: b64 }),
        })
          .then(function (res) {
            if (!res.ok) {
              if (shouldRetryHttpStatus(res.status) && attempt < attempts - 1) {
                return sleep(delay * Math.pow(2, attempt)).then(function () {
                  return tryOnce(attempt + 1);
                });
              }
              return null;
            }
            return res.json();
          })
          .then(function (data) {
            if (data == null) return null;
            var rec = extractAnalysisRecord(data);
            if (rec) {
              return { source: 'ai', scores: mapScoresFromAnalysisRecord(rec), rec: rec };
            }
            if (attempt < attempts - 1) {
              return sleep(delay * Math.pow(2, attempt)).then(function () {
                return tryOnce(attempt + 1);
              });
            }
            return null;
          })
          .catch(function () {
            if (attempt < attempts - 1) {
              return sleep(delay * Math.pow(2, attempt)).then(function () {
                return tryOnce(attempt + 1);
              });
            }
            return null;
          });
      }
      return tryOnce(0).then(function (result) {
        if (result) return result;
        return deriveDemoScoresFromFile(file).then(function (sc) {
          return { source: 'demo', scores: sc };
        });
      });
    }).catch(function () {
      return deriveDemoScoresFromFile(file).then(function (sc) {
        return { source: 'demo', scores: sc };
      });
    });
  }

  function setRingForScore(_overall) {
    /* Old circular avatar ring removed in new layout — no-op */
  }

  var scoreDeltaEl = document.getElementById('score-delta');

  function updateDelta(overall, potential) {
    if (!scoreDeltaEl) return;
    var d = Math.round((potential || 0) - (overall || 0));
    scoreDeltaEl.textContent = '+' + Math.max(0, d);
  }

  /* ============================================================
     1–10 CHAD-TIER — unser Rating-System für den Shield-Screen
     1–3  → SUB 3
     4–5  → SUB 5
     6    → LTN
     7    → MTN
     8    → HTN
     9    → CHAD
     10   → TRUE ADAM
     ============================================================ */
  function to10(score100) {
    var v = Math.round((score100 || 0) / 10);
    if (v < 1) v = 1;
    if (v > 10) v = 10;
    return v;
  }
  function chadTier(r10) {
    var r = Math.round(r10);
    if (r <= 3) return 'SUB 3';
    if (r <= 5) return 'SUB 5';
    if (r === 6) return 'LTN';
    if (r === 7) return 'MTN';
    if (r === 8) return 'HTN';
    if (r === 9) return 'CHAD';
    return 'TRUE ADAM';
  }
  function tierColor(r10) {
    var r = Math.round(r10);
    if (r <= 3) return '#ff3b30';
    if (r <= 5) return '#ff9500';
    if (r === 6) return '#ffcc00';
    if (r === 7) return '#30d158';
    if (r === 8) return '#64d2ff';
    if (r === 9) return '#0a84ff';
    return '#ff2d55'; /* TRUE ADAM accent (gradient handled separately) */
  }
  function tierBarBg(r10) {
    var r = Math.round(r10);
    if (r === 10) return 'linear-gradient(90deg, #ff2d55 0%, #ffcf6b 50%, #af52de 100%)';
    var c = tierColor(r);
    return 'linear-gradient(90deg, ' + c + ' 0%, ' + c + 'cc 100%)';
  }
  function tierScoreBoxStyle(r10) {
    var c = tierColor(r10);
    if (r10 === 10) {
      return {
        bg: 'rgba(255, 45, 85, 0.14)',
        border: 'rgba(255, 45, 85, 0.6)',
        glow: 'rgba(255, 45, 85, 0.35)'
      };
    }
    return {
      bg: c + '22',
      border: c + '99',
      glow: c + '55'
    };
  }

  /* 6 Kategorien — Jawline first (gewünscht) + Symmetry, Eye Area, Cheekbones, Skin, Definition */
  var STAT_CATEGORIES = [
    { name: 'Jawline',    key: 'jawline',    offset: 2,  task: 'Jaw Exercise' },
    { name: 'Symmetry',   key: 'symmetry',   offset: -4, task: 'Eyebrow Raises' },
    { name: 'Eye Area',   key: 'eyeArea',    offset: 5,  task: 'Eyebrow Raises' },
    { name: 'Cheekbones', key: 'cheekbones', offset: -2, task: 'Fish Face' },
    { name: 'Skin',       key: 'skin',       offset: 8,  task: 'Drink Water' },
    { name: 'Definition', key: 'definition', offset: -3, task: 'Neck Stretches' }
  ];

  function deriveCategoryScores(overall, potential, aiRec) {
    var out = {};
    var manual = (typeof window !== 'undefined' && window.__manualStatOverrides) || null;
    STAT_CATEGORIES.forEach(function (c) {
      if (manual && typeof manual[c.key] === 'number') {
        var r10 = Math.max(1, Math.min(10, Math.round(manual[c.key])));
        out[c.key] = Math.max(10, Math.min(99, r10 * 10 - 5));
        return;
      }
      var fromAi = aiRec && typeof aiRec[c.key] === 'number' ? aiRec[c.key] : null;
      if (fromAi != null) {
        out[c.key] = Math.max(10, Math.min(99, Math.round(fromAi)));
      } else {
        var seed = (overall * 31 + potential * 17 + c.name.charCodeAt(0) * 7) >>> 0;
        var jitter = ((seed % 11) - 5);
        out[c.key] = Math.max(10, Math.min(99, overall + c.offset + jitter));
      }
    });
    return out;
  }

  /* Limitless Rating Card — Halbkreis-Gauge (180° Arc) in einheitlichem Limitless-Blau */
  var pslNumEl      = document.getElementById('psl-num');
  var pslTierPillEl = document.getElementById('psl-tier-pill');
  var pslGaugeFill  = document.getElementById('psl-gauge-fill');
  var pslGrad0      = document.getElementById('psl-grad-0');
  var pslGrad100    = document.getElementById('psl-grad-100');
  var chadGridEl    = document.getElementById('chad-grid');
  /* Pfadlänge ≈ π·r·(angle/180) = π·82 ≈ 257.6 */
  var PSL_ARC_LEN   = 258;
  /* Unified Limitless-Blau */
  var BRAND_BLUE    = '#0a84ff';
  var BRAND_CYAN    = '#5ac8fa';

  function renderPSL(overall100) {
    var r = to10(overall100);
    var tier = chadTier(r);
    var isTrue = r === 10;

    if (pslNumEl) {
      pslNumEl.textContent = String(r);
      pslNumEl.classList.remove('tier-trueadam');
      if (isTrue) {
        pslNumEl.classList.add('tier-trueadam');
        pslNumEl.style.background = '';
        pslNumEl.style.filter =
          'drop-shadow(0 0 14px rgba(255, 45, 85, 0.6)) drop-shadow(0 0 4px rgba(175, 82, 222, 0.4))';
      } else {
        pslNumEl.style.background = '';
        pslNumEl.style.filter = '';
      }
    }

    if (pslTierPillEl) {
      pslTierPillEl.textContent = tier;
      pslTierPillEl.style.background = '';
      pslTierPillEl.style.borderColor = '';
      pslTierPillEl.style.color = '';
      pslTierPillEl.style.textShadow = '';
      if (isTrue) pslTierPillEl.classList.add('tier-trueadam');
      else        pslTierPillEl.classList.remove('tier-trueadam');
    }

    if (pslGaugeFill) {
      var offset = PSL_ARC_LEN * (1 - r / 10);
      pslGaugeFill.style.strokeDashoffset = String(offset);
      pslGaugeFill.style.filter = isTrue
        ? 'drop-shadow(0 0 10px rgba(255, 45, 85, 0.7)) drop-shadow(0 0 3px rgba(175, 82, 222, 0.5))'
        : 'drop-shadow(0 0 10px rgba(10, 132, 255, 0.7)) drop-shadow(0 0 4px rgba(90, 200, 250, 0.5))';
    }
    if (pslGrad0 && pslGrad100) {
      if (isTrue) {
        pslGrad0.setAttribute('stop-color', '#ff2d55');
        pslGrad100.setAttribute('stop-color', '#af52de');
      } else {
        pslGrad0.setAttribute('stop-color', BRAND_BLUE);
        pslGrad100.setAttribute('stop-color', BRAND_CYAN);
      }
    }
  }

  /* Chad-Tier-Grid: 6 Kategorien — schwarze Texte + Weiß-Hellblau-Halo, Bars hellblau */
  function renderChadStats(overall, potential, aiRec) {
    if (!chadGridEl) return;
    var cats = deriveCategoryScores(overall, potential, aiRec);
    var barGradient = 'linear-gradient(90deg, #7fd0ff 0%, #b3e0ff 100%)';
    var barGlow     = '0 0 8px rgba(127, 208, 255, 0.85), 0 0 16px rgba(179, 224, 255, 0.55)';
    var html = '';
    STAT_CATEGORIES.forEach(function (cat) {
      var sc100 = cats[cat.key];
      var r10 = to10(sc100);
      var tier = chadTier(r10);
      var isTrue = r10 === 10;
      var pct = (r10 / 10) * 100;
      var numClass  = isTrue ? 'lk-chad-num tier-trueadam' : 'lk-chad-num';
      var tierClass = isTrue ? 'lk-chad-tier tier-trueadam' : 'lk-chad-tier';
      var barStyle = isTrue
        ? 'width:' + pct + '%; background: linear-gradient(90deg, #ff2d55 0%, #ffcf6b 50%, #af52de 100%); box-shadow: 0 0 8px rgba(255, 45, 85, 0.45);'
        : 'width:' + pct + '%; background: ' + barGradient + '; box-shadow: ' + barGlow + ';';
      html +=
        '<div class="lk-chad-card">' +
          '<span class="lk-chad-label">' + cat.name + '</span>' +
          '<span class="lk-chad-score-row">' +
            '<span class="' + numClass + '">' + r10 + '</span>' +
            '<span class="lk-chad-denom">/10</span>' +
          '</span>' +
          '<span class="' + tierClass + '">' + tier + '</span>' +
          '<div class="lk-chad-bar-wrap">' +
            '<div class="lk-chad-bar" style="' + barStyle + '"></div>' +
          '</div>' +
          '<div class="lk-chad-task" title="Unlock Task für ' + cat.name + '">' +
            '<span class="lk-chad-task-dot"></span>' +
            '<span class="lk-chad-task-name">' + cat.task + '</span>' +
          '</div>' +
        '</div>';
    });
    chadGridEl.innerHTML = html;
  }

  /* Legacy stubs für alte Aufrufe (Trajectory-Code unten) */
  function updatePSL() {}
  function resetPSL() {
    if (pslNumEl) pslNumEl.textContent = '—';
    if (pslTierPillEl) pslTierPillEl.textContent = '—';
    if (pslGaugeFill) pslGaugeFill.style.strokeDashoffset = String(PSL_ARC_LEN);
  }
  function updateDefChip() {}

  function applyScoresToUi(overall, potential, source, aiRec) {
    /* Fresh Scan (AI oder Demo) → alle manuellen Overrides zurücksetzen */
    if (source !== 'manual') {
      try {
        window.__manualStatOverrides = {};
        window.__manualOverallOverride = null;
      } catch (e) {}
    }
    /* Cache letzten "echten" State, damit Edits später darauf aufsetzen können */
    if (source !== 'manual') {
      try {
        window.__lastApplied = {
          overall: overall,
          potential: potential,
          source: source,
          aiRec: aiRec || null
        };
      } catch (e) {}
    }

    scoreEl.textContent = String(overall);
    potentialEl.textContent = String(potential);
    setRingForScore(overall);
    var oFrac = Math.min(100, Math.max(0, overall)) / 100;
    if (trajFill) {
      trajFill.style.width = Math.max(oFrac * 100, oFrac > 0 ? 2 : 0) + '%';
      trajFill.style.background = scoreGradientCssDiagonal(overall);
    }
    if (trajDot) trajDot.style.left = trajectoryDotLeftPercent(potential) + '%';
    if (scanTraj) scanTraj.hidden = false;
    updateDelta(overall, potential);
    renderPSL(overall);
    renderChadStats(overall, potential, aiRec || null);
    if (scanStatus) {
      scanStatus.innerHTML = '';
      if (source === 'ai') {
        scanStatus.innerHTML = '<span class="shield-scan-source-badge">KI</span>';
      }
    }

    /* Edit-Panel benachrichtigen, damit Inputs synchronisieren */
    try {
      var cats = deriveCategoryScores(overall, potential, aiRec || null);
      window.dispatchEvent(new CustomEvent('shield-scores-applied', {
        detail: {
          overall: overall,
          potential: potential,
          source: source,
          aiRec: aiRec || null,
          stats: cats
        }
      }));
    } catch (e) {}
  }

  function resetScoresPlaceholder() {
    scoreEl.textContent = '…';
    potentialEl.textContent = '…';
    if (scoreDeltaEl) scoreDeltaEl.textContent = '+—';
    resetPSL();
  }

  function ensureTeaserScores() {
    var s = parseInt(scoreEl.textContent, 10);
    var p = parseInt(potentialEl.textContent, 10);
    if (!isFinite(s) || s <= 0) s = 72;
    if (!isFinite(p) || p <= 0) p = 86;
    applyScoresToUi(s, p, 'demo', null);
  }

  /* Avatar-Photo: wenn Foto hochgeladen, Placeholder verstecken */
  var lkAvatarEl = document.getElementById('lk-avatar');
  function showScanEmpty() {
    if (scanImg) scanImg.removeAttribute('src');
    if (lkAvatarEl) lkAvatarEl.classList.remove('has-photo');
  }
  function showScanFilled(dataUrl) {
    if (scanImg && dataUrl) scanImg.src = dataUrl;
    if (lkAvatarEl && dataUrl) lkAvatarEl.classList.add('has-photo');
  }

  function persistScan(dataUrl, overall, potential, source) {
    try {
      localStorage.setItem(STORAGE_KEY_SCAN, dataUrl);
      localStorage.setItem(
        STORAGE_KEY_SCAN_SCORES,
        JSON.stringify({ overall: overall, potential: potential, source: source }),
      );
    } catch (e) {}
  }

  function restoreScanFromStorage() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY_SCAN);
      var rawScores = localStorage.getItem(STORAGE_KEY_SCAN_SCORES);
      if (!saved || saved.indexOf('data:image') !== 0) return;
      var parsed = null;
      if (rawScores) {
        try {
          parsed = JSON.parse(rawScores);
        } catch (e) {}
      }
      showScanFilled(saved);
      if (parsed && typeof parsed.overall === 'number' && typeof parsed.potential === 'number') {
        applyScoresToUi(parsed.overall, parsed.potential, parsed.source === 'ai' ? 'ai' : 'demo');
      } else {
        resetScoresPlaceholder();
        scoreEl.textContent = '—';
        potentialEl.textContent = '—';
      }
    } catch (e) {}
  }

  /* ============================================================
     ANALYZE-OVERLAY — 1:1 wie App (Face Scan Loader)
     ============================================================ */
  var GALLERY_ANALYSIS_STEPS = [
    'Detecting face...',
    'Mapping 76+ landmarks...',
    'Analyzing jawline...',
    'Measuring symmetry...',
    'Evaluating eye area...',
    'Checking bloat level...',
    'Scoring cheekbones...',
    'Computing AI score...'
  ];
  var ANALYZE_CAP = 0.92;
  var ANALYZE_MIN_MS = 3200;

  function analyzeProgress(elapsedSec) {
    return Math.min(ANALYZE_CAP * (1 - Math.exp(-elapsedSec / 6.5)), ANALYZE_CAP);
  }
  function analyzeStepIdx(elapsedSec, total) {
    if (total <= 0) return 0;
    return Math.min(total - 1, Math.max(0, Math.floor(elapsedSec / 1.35)));
  }

  var overlayEl   = document.getElementById('analyze-overlay');
  var overlayImg  = document.getElementById('analyze-img');
  var overlayPct  = document.getElementById('analyze-pct');
  var overlayStep = document.getElementById('analyze-step');
  var overlayBar  = document.getElementById('analyze-bar-fill');
  var overlayRaf = 0;
  var overlayStart = 0;
  var overlayDone = false;
  var overlayPending = null;

  function showAnalyzeOverlay(dataUrl) {
    if (!overlayEl) return;
    if (overlayImg) overlayImg.src = dataUrl;
    overlayEl.hidden = false;
    overlayEl.removeAttribute('aria-hidden');
    overlayEl.classList.remove('is-fadeout');
    document.documentElement.style.overflow = 'hidden';
    overlayDone = false;
    overlayPending = null;
    overlayStart = Date.now();
    if (overlayPct) overlayPct.textContent = '0%';
    if (overlayBar) overlayBar.style.width = '0%';
    if (overlayStep) overlayStep.textContent = GALLERY_ANALYSIS_STEPS[0];
    cancelAnimationFrame(overlayRaf);

    function loop() {
      var elapsed = (Date.now() - overlayStart) / 1000;
      var p = analyzeProgress(elapsed);
      var idx = analyzeStepIdx(elapsed, GALLERY_ANALYSIS_STEPS.length);
      if (overlayPct) overlayPct.textContent = Math.min(100, Math.floor(p * 100)) + '%';
      if (overlayStep) overlayStep.textContent = GALLERY_ANALYSIS_STEPS[Math.min(idx, GALLERY_ANALYSIS_STEPS.length - 1)];
      if (overlayBar) overlayBar.style.width = (p * 100) + '%';
      if (overlayPending && Date.now() - overlayStart >= ANALYZE_MIN_MS) {
        finishAnalyzeOverlay();
        return;
      }
      overlayRaf = requestAnimationFrame(loop);
    }
    overlayRaf = requestAnimationFrame(loop);
  }

  function finishAnalyzeOverlay() {
    if (overlayDone || !overlayEl) return;
    overlayDone = true;
    cancelAnimationFrame(overlayRaf);
    if (overlayPct) overlayPct.textContent = '100%';
    if (overlayStep) overlayStep.textContent = GALLERY_ANALYSIS_STEPS[GALLERY_ANALYSIS_STEPS.length - 1];
    if (overlayBar) overlayBar.style.width = '100%';
    setTimeout(function () {
      overlayEl.classList.add('is-fadeout');
      setTimeout(function () {
        overlayEl.hidden = true;
        overlayEl.setAttribute('aria-hidden', 'true');
        overlayEl.classList.remove('is-fadeout');
        document.documentElement.style.overflow = '';
        if (overlayPending) {
          var s = overlayPending;
          applyScoresToUi(s.overall, s.potential, s.source, s.rec || null);
          overlayPending = null;
        }
      }, 380);
    }, 420);
  }

  function submitAnalyzeResult(scores, source, rec) {
    overlayPending = {
      overall: scores.overall,
      potential: scores.potential,
      source: source,
      rec: rec
    };
    if (Date.now() - overlayStart >= ANALYZE_MIN_MS) {
      finishAnalyzeOverlay();
    }
  }

  scanFile.addEventListener('change', function () {
    var f = scanFile.files && scanFile.files[0];
    if (!f || !f.type || f.type.indexOf('image/') !== 0) return;
    var myGen = ++analyzeGen;
    var reader = new FileReader();
    reader.onload = function () {
      if (myGen !== analyzeGen) return;
      var dataUrl = typeof reader.result === 'string' ? reader.result : '';
      showScanFilled(dataUrl);
      resetScoresPlaceholder();
      if (scanStatus) scanStatus.textContent = 'KI analysiert…';
      if (scanWrap) scanWrap.classList.add('is-analyzing');
      if (scanMock) scanMock.classList.add('is-analyzing-ui');

      showAnalyzeOverlay(dataUrl);

      analyzeImageFile(f).then(function (out) {
        if (myGen !== analyzeGen) return;
        if (scanWrap) scanWrap.classList.remove('is-analyzing');
        if (scanMock) scanMock.classList.remove('is-analyzing-ui');
        var s = out.scores;
        persistScan(dataUrl, s.overall, s.potential, out.source);
        submitAnalyzeResult(s, out.source, out.rec || null);
      });
    };
    reader.readAsDataURL(f);
    scanFile.value = '';
  });

  restoreScanFromStorage();
  ensureTeaserScores();

  /* Für Clipper-Override-IIFE: gleiche Re-Render-Pipeline (Trajectory, Stats, Def-Chip) */
  window.applyShieldScores = applyScoresToUi;

  selectTask(0);
})();

  <!-- Edit-Panel: Ratings manuell bearbeiten + Foto wechseln -->
  <script>
(function () {
  var STATS = [
    { name: 'Jawline',    key: 'jawline' },
    { name: 'Symmetry',   key: 'symmetry' },
    { name: 'Eye Area',   key: 'eyeArea' },
    { name: 'Cheekbones', key: 'cheekbones' },
    { name: 'Skin',       key: 'skin' },
    { name: 'Definition', key: 'definition' }
  ];

  var gridEl       = document.getElementById('edit-stats-grid');
  var overallInput = document.getElementById('edit-overall');
  var resetBtn     = document.getElementById('edit-reset');

  if (!gridEl || !overallInput || !resetBtn) return;

  var statInputs = {};
  STATS.forEach(function (s) {
    var wrap = document.createElement('div');
    wrap.className = 'edit-stat';
    wrap.innerHTML =
      '<span class="edit-stat-label">' + s.name + '</span>' +
      '<input type="number" min="1" max="10" step="1" class="edit-input" ' +
      'data-cat="' + s.key + '" placeholder="—" inputmode="numeric" />' +
      '<span class="edit-denom">/10</span>';
    gridEl.appendChild(wrap);
    statInputs[s.key] = wrap.querySelector('input');
  });

  function clampInt(v, lo, hi) {
    var n = parseInt(v, 10);
    if (!isFinite(n)) return null;
    return Math.max(lo, Math.min(hi, n));
  }

  function to10FromScore(score100) {
    if (typeof score100 !== 'number' || !isFinite(score100)) return null;
    var r = Math.round(score100 / 10);
    if (r < 1) r = 1;
    if (r > 10) r = 10;
    return r;
  }

  function syncInputsFromScores(detail) {
    if (!detail) return;
    var r10 = to10FromScore(detail.overall);
    overallInput.value = r10 != null ? String(r10) : '';
    overallInput.classList.remove('edit-input-overridden');
    STATS.forEach(function (s) {
      var inp = statInputs[s.key];
      if (!inp) return;
      var v10 = to10FromScore(detail.stats && detail.stats[s.key]);
      inp.value = v10 != null ? String(v10) : '';
      inp.classList.remove('edit-input-overridden');
    });
  }

  /* Sync, wenn Analyse / Initial-Render fertig ist */
  window.addEventListener('shield-scores-applied', function (e) {
    var d = e && e.detail;
    if (!d) return;
    if (d.source === 'manual') return; /* bei manuellen Edits nicht überschreiben */
    syncInputsFromScores(d);
  });

  function currentBase() {
    return (window.__lastApplied) || { overall: 72, potential: 86, source: 'demo', aiRec: null };
  }

  function rerenderWithOverrides(newOverall100) {
    var base = currentBase();
    var overall = newOverall100 != null ? newOverall100 : base.overall;
    overall = Math.max(10, Math.min(99, overall));
    var potential = Math.max(overall, base.potential || 0);
    if (typeof window.applyShieldScores === 'function') {
      window.applyShieldScores(overall, potential, 'manual', base.aiRec);
    }
  }

  overallInput.addEventListener('input', function () {
    var r = clampInt(overallInput.value, 1, 10);
    if (r == null) {
      window.__manualOverallOverride = null;
      overallInput.classList.remove('edit-input-overridden');
      rerenderWithOverrides(null);
      return;
    }
    window.__manualOverallOverride = r;
    overallInput.classList.add('edit-input-overridden');
    rerenderWithOverrides(r * 10 - 5);
  });

  STATS.forEach(function (s) {
    var inp = statInputs[s.key];
    if (!inp) return;
    inp.addEventListener('input', function () {
      var r = clampInt(inp.value, 1, 10);
      if (!window.__manualStatOverrides) window.__manualStatOverrides = {};
      if (r == null) {
        delete window.__manualStatOverrides[s.key];
        inp.classList.remove('edit-input-overridden');
      } else {
        window.__manualStatOverrides[s.key] = r;
        inp.classList.add('edit-input-overridden');
      }
      rerenderWithOverrides(window.__manualOverallOverride != null
        ? window.__manualOverallOverride * 10 - 5
        : null);
    });
  });

  resetBtn.addEventListener('click', function () {
    window.__manualStatOverrides = {};
    window.__manualOverallOverride = null;
    var base = currentBase();
    if (typeof window.applyShieldScores === 'function') {
      window.applyShieldScores(base.overall, base.potential, base.source || 'demo', base.aiRec);
    }
  });

  /* Initial-Sync: Das erste applyScoresToUi aus dem Main-Script lief vor diesem
     Listener — wir triggern einen Re-Render, damit die Inputs befüllt werden. */
  (function initialSync() {
    var base = window.__lastApplied;
    if (base && typeof window.applyShieldScores === 'function') {
      window.applyShieldScores(base.overall, base.potential, base.source || 'demo', base.aiRec);
    }
  })();
})();
  </script>
</body>
</html>
