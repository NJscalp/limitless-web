<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fcf9ef">
  <title>Limitless – Shield</title>
  <meta name="description" content="Screen Time Shield — wie in der iOS-App (ManagedSettingsUI).">
  <style>
    /**
     * ShieldConfigurationExtension: creamBackground, gold, textSub,
     * backgroundBlurStyle .extraLight, Labels wie ShieldConfiguration.
     */
    :root {
      --cream: rgb(252, 249, 239);
      --cream-hex: #fcf9ef;
      --gold: #d1ad4d;
      --text-sub: rgb(115, 115, 125);
      --title: #000000;
      /**
       * Abstände für das 3:4-Mockup — kompakter, damit alles locker reinpasst
       */
      --s-gap-icon-title: 12px;
      --s-gap-title-sub: 4px;
      --s-gap-sub-btns: 14px;
      --s-gap-primary-secondary: 10px;
      --s-h-margin: 28px;
      --s-icon-max: 104px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: rgb(242, 242, 245);
      min-height: 100%;
    }

    /* Limitless-App Page-Theme — warmes iOS-Off-White mit dezenten Pastell-Flecken
       (angelehnt an results-score-hero::before: Purple/Blue/Green) */
    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      color: #000;
      background:
        radial-gradient(60% 40% at 15% 10%, rgba(175, 82, 222, 0.13) 0%, rgba(175, 82, 222, 0) 70%),
        radial-gradient(55% 35% at 90% 5%, rgba(90, 200, 250, 0.15) 0%, rgba(90, 200, 250, 0) 70%),
        radial-gradient(70% 45% at 85% 95%, rgba(255, 45, 85, 0.10) 0%, rgba(255, 45, 85, 0) 70%),
        radial-gradient(60% 40% at 10% 90%, rgba(99, 230, 190, 0.12) 0%, rgba(99, 230, 190, 0) 70%),
        linear-gradient(180deg, #ffffff 0%, rgb(245, 245, 248) 60%, rgb(238, 238, 242) 100%);
      padding: 36px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Stage = darkmode desktop canvas for clippers */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
    }

    /* 3:4 Portrait-Frame (Clipper-Screenshot-Target) — 600×800 */
    .phone-mockup {
      position: relative;
      width: 600px;
      height: 800px;
      max-width: calc(100vw - 32px);
      border-radius: 40px;
      background: #0a0a0a;
      padding: 9px;
      box-sizing: border-box;
      box-shadow:
        0 0 0 1.5px #1f1f22,
        0 40px 90px rgba(0, 0, 0, 0.7),
        0 14px 34px rgba(0, 0, 0, 0.5);
      flex-shrink: 0;
      isolation: isolate;
    }

    .phone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 32px;
      overflow: hidden;
      background: var(--cream-hex);
      isolation: isolate;
    }

    .phone-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 36px;
      border-radius: 20px;
      background: #000;
      z-index: 20;
      pointer-events: none;
    }

    .phone-status-bar {
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 28px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 19;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.2px;
      pointer-events: none;
    }

    .phone-status-bar .phone-time {
      display: inline-flex;
      align-items: center;
      height: 100%;
      line-height: 1;
    }

    .phone-status-bar .phone-icons {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #ffffff;
    }

    .phone-status-bar svg {
      display: block;
      height: 12px;
      width: auto;
      fill: currentColor;
    }

    .phone-battery {
      position: relative;
      width: 26px;
      height: 12px;
      border: 1.2px solid #000;
      border-radius: 3.5px;
      box-sizing: border-box;
    }

    .phone-battery::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 5px;
      background: #000;
      border-radius: 0 1px 1px 0;
    }

    .phone-battery-fill {
      position: absolute;
      inset: 1.2px;
      background: #000;
      border-radius: 1.8px;
      width: calc((100% - 2.4px) * 1);
    }

    /* Shield innerhalb des Screens */
    .shield-root {
      /* Dunkles Anthrazit-Theme für den Shield-Screen */
      --cream-hex: #16171c;
      --cream: #16171c;
      --title: #ffffff;
      --text-sub: rgba(235, 235, 245, 0.55);
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background:
        radial-gradient(70% 45% at 50% 10%, rgba(240, 193, 87, 0.08) 0%, rgba(240, 193, 87, 0) 72%),
        radial-gradient(60% 45% at 85% 25%, rgba(90, 200, 250, 0.06) 0%, rgba(90, 200, 250, 0) 72%),
        radial-gradient(60% 45% at 15% 85%, rgba(175, 82, 222, 0.06) 0%, rgba(175, 82, 222, 0) 72%),
        linear-gradient(180deg, #1c1d22 0%, #16171c 55%, #111216 100%);
      padding-top: 58px;
      border-radius: inherit;
    }

    /* Clipper-Controls: Light-Theme (angelehnt an Limitless-App Card-Style) */
    .clipper-controls {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border: 1px solid rgb(232, 232, 236);
      border-radius: 20px;
      padding: 18px 18px 16px;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 10px 24px rgba(0, 0, 0, 0.06),
        0 2px 6px rgba(0, 0, 0, 0.04);
    }

    .ct-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .ct-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #000;
    }

    .ct-sub {
      font-size: 12px;
      color: rgb(112, 112, 120);
      font-weight: 500;
    }

    .ct-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ct-row-split {
      flex-direction: row;
      gap: 12px;
    }

    .ct-row-split > div {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ct-row-actions {
      flex-direction: row;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .ct-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgb(112, 112, 120);
    }

    .ct-row textarea,
    .ct-row input[type="number"] {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      background: rgb(242, 242, 245);
      color: #000;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgb(232, 232, 236);
      border-radius: 10px;
      resize: vertical;
    }

    .ct-row input[type="text"] {
      background: rgb(242, 242, 245) !important;
      color: #000 !important;
      border: 1px solid rgb(232, 232, 236) !important;
    }

    .ct-row textarea {
      max-height: 90px;
      line-height: 1.4;
    }

    .ct-row input[type="number"]::-webkit-inner-spin-button,
    .ct-row input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }

    .ct-row textarea:focus,
    .ct-row input[type="number"]:focus,
    .ct-row input[type="text"]:focus {
      outline: none;
      border-color: rgb(0, 122, 255);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
      background: #fff;
    }

    .ct-task-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: thin;
      padding: 4px 0;
    }

    .ct-task-strip::-webkit-scrollbar {
      height: 6px;
    }

    .ct-task-strip::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.14);
      border-radius: 99px;
    }

    .ct-task-strip .task-thumb {
      width: 40px;
      height: 40px;
      background: #fcf9ef;
      border: 1.5px solid rgb(232, 232, 236);
      border-radius: 10px;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .ct-task-strip .task-thumb[aria-pressed="true"] {
      border-color: #d1ad4d;
      box-shadow: 0 0 0 2px rgba(209, 173, 77, 0.35);
    }

    .ct-task-strip .task-thumb:hover {
      transform: scale(1.05);
    }

    .ct-task-strip .task-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fcf9ef;
    }

    .ct-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .ct-btn:active {
      transform: scale(0.98);
    }

    .ct-btn-ghost {
      background: rgb(242, 242, 245);
      color: #000;
      border-color: rgb(232, 232, 236);
    }

    .ct-btn-ghost:hover {
      background: rgb(232, 232, 236);
    }

    .ct-btn-primary {
      background: linear-gradient(135deg, #ff9500 0%, #ff6b00 100%);
      color: #fff;
      flex: 1;
      min-width: 160px;
      box-shadow: 0 6px 18px rgba(255, 149, 0, 0.28);
    }

    .ct-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(255, 149, 0, 0.36);
    }

    .ct-btn-primary:disabled {
      opacity: 0.7;
      cursor: progress;
      transform: none;
    }

    .ct-hint {
      font-size: 11px;
      font-weight: 500;
      color: rgb(173, 173, 177);
      margin-top: 2px;
    }

    /* Beim Capture: DOM-Elemente ausblenden, die html2canvas/html-to-image Probleme machen */
    .is-capturing .shield-blur {
      display: none !important;
    }
    .is-capturing .shield-video-badge {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    /* Animationen für Screenshots anhalten, damit es scharf gerendert wird */
    .is-capturing .shield-scan-delta {
      animation: none !important;
    }

    /* ────────────────────────────────────────────────────────────────
     * Story-Telling im Shield (integrierter, kein aufdringliches CTA):
     *   ▶ Video-Badge  → zeigt „Video-Task"
     *   Looksmax-Chips → zeigt „Face-Workouts, verbessern Aussehen"
     *   App-Footer     → subtiler App-Store-Hinweis im iOS-Look
     * ──────────────────────────────────────────────────────────────── */

    .shield-hero-frame {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--s-gap-icon-title);
    }

    .shield-hero-frame .shield-icon-wrap {
      margin-bottom: 0;
    }

    .shield-video-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px 4px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      white-space: nowrap;
    }

    .shield-video-badge svg {
      width: 9px;
      height: 9px;
      fill: #fff;
    }

    /* Looksmax-Impact-Chips: gold, dezent, sagt „Tasks verbessern dein Gesicht" */
    /* Inline Looksmax-Gains (statt Pills): „+4 Jaw · +3 Cheeks" — clean, premium */
    .shield-looksmax-row {
      display: flex;
      gap: 0;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px auto 14px;
      max-width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .shield-chip {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      padding: 0 12px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.005em;
      line-height: 1.1;
      white-space: nowrap;
      position: relative;
    }

    .shield-chip + .shield-chip::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #d1ad4d;
      box-shadow: 0 0 6px rgba(209, 173, 77, 0.5);
    }

    .shield-chip-plus {
      font-weight: 800;
      color: #ffcf6b;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    /* ============================================================
       ASCENDMAX-STYLE LAYOUT (mit Limitless-Brand)
       Avatar links + Task-Info rechts | Limitless-App-CTA
       | PSL 1–10 Rating | 6 Chad-Tier-Cards (Jawline...)
       ============================================================ */

    /* Hero-Row: großes Foto links + Unlock-Task-Info rechts */
    .lk-hero-row {
      display: flex;
      align-items: stretch;
      gap: 16px;
      width: 100%;
      margin: 0 0 14px;
    }

    .lk-avatar {
      flex-shrink: 0;
      width: 128px;
      height: 128px;
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: block;
    }

    /* Animierter Rainbow-Ring und Pulse-Halo entfernt — stattdessen leise leuchtende weiße Umrahmung */
    .lk-avatar::before,
    .lk-avatar::after { content: none; display: none; }

    .lk-avatar-hint {
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ffd27a;
      background: rgba(28, 29, 34, 0.92);
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
      line-height: 1;
      border: 1px solid rgba(240, 193, 87, 0.55);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      z-index: 3;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    .lk-avatar.has-photo .lk-avatar-hint { opacity: 0; }

    .lk-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 26px;
      background: #1c1d22;
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12) inset,
        0 0 6px rgba(255, 255, 255, 0.22),
        0 0 14px rgba(255, 255, 255, 0.12),
        0 10px 26px rgba(0, 0, 0, 0.55),
        0 4px 10px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .lk-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
    }
    .lk-avatar.has-photo .lk-avatar-placeholder { display: none; }

    .lk-avatar-placeholder {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 60px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .lk-task-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 2px;
      gap: 8px;
    }

    /* Blocked-App Headline: Icon links + großer Name "TikTok" + "Blocked" Label */
    .lk-blocked {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .lk-blocked-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 8px 20px rgba(255, 45, 85, 0.28),
        0 4px 10px rgba(0, 0, 0, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.12) inset;
      overflow: hidden;
    }
    .lk-blocked-icon svg { width: 22px; height: 22px; display: block; }
    .lk-blocked-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Echtes TikTok-App-Icon — iOS-Style: schwarzer Hintergrund + RGB-Split-Note */
    .lk-tiktok-icon {
      background: #000000;
      box-shadow:
        0 8px 20px rgba(254, 44, 85, 0.22),
        0 4px 10px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }
    .lk-tiktok-icon .lk-tt-cyan  { fill: #25F4EE; transform: translate(-0.9px, 0.6px); }
    .lk-tiktok-icon .lk-tt-red   { fill: #FE2C55; transform: translate(0.9px, -0.6px); }
    .lk-tiktok-icon .lk-tt-white { fill: #ffffff; }

    .lk-blocked-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .lk-blocked-name {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.035em;
      color: #ffffff;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow:
        0 0 14px rgba(255, 45, 85, 0.35),
        0 0 4px rgba(255, 255, 255, 0.15);
    }
    .lk-blocked-tag {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      color: #ff3b30;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 5px;
      line-height: 1;
      text-shadow: 0 0 10px rgba(255, 59, 48, 0.55);
      animation: lk-blocked-pulse 2.4s ease-in-out infinite;
    }
    .is-capturing .lk-blocked-tag { animation: none !important; }
    @keyframes lk-blocked-pulse {
      0%, 100% { text-shadow: 0 0 8px rgba(255, 59, 48, 0.35); }
      50%      { text-shadow: 0 0 16px rgba(255, 59, 48, 0.75), 0 0 2px rgba(255, 59, 48, 0.5); }
    }

    /* Trenner zwischen Blocked-App und Unlock-Task */
    .lk-divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.14) 30%,
        rgba(255, 255, 255, 0.14) 70%,
        rgba(255, 255, 255, 0) 100%);
      margin: 1px 0 2px;
    }

    /* Unlock-Task Eyebrow (kleines Gold-Label über der Task-Card) */
    .lk-eyebrow {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #d1ad4d;
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
      text-shadow: 0 0 10px rgba(240, 193, 87, 0.55);
    }
    .lk-eyebrow-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
    }

    /* Unlock-Task als App-Card (Dark-Gold-Theme) */
    .lk-task-now {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(36, 30, 22, 0.95) 0%, rgba(28, 24, 18, 0.95) 100%);
      border: 1.2px solid rgba(240, 193, 87, 0.55);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 10px 22px rgba(240, 193, 87, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.45),
        0 2px 6px rgba(0, 0, 0, 0.3);
    }
    .lk-task-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background:
        radial-gradient(60% 60% at 35% 30%, rgba(255, 236, 170, 0.9) 0%, rgba(240, 193, 87, 0.35) 55%, rgba(209, 173, 77, 0.12) 100%);
      box-shadow:
        0 0 0 1.2px rgba(240, 193, 87, 0.55) inset,
        0 4px 10px rgba(240, 193, 87, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .lk-task-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .lk-task-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1;
    }
    .lk-task-title {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #ffffff;
      margin: 0;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow:
        0 0 12px rgba(240, 193, 87, 0.7),
        0 0 2px rgba(240, 193, 87, 0.35);
    }
    .lk-task-meta {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(235, 235, 245, 0.6);
      letter-spacing: -0.005em;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lk-task-meta b {
      color: #f0c157;
      font-weight: 800;
    }
    .lk-task-chev {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      color: rgba(184, 147, 59, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lk-task-chev svg { width: 100%; height: 100%; display: block; }

    /* Unsere App-Store-Card: klein + linksbündig (auf Höhe des Fotos links) */
    .lk-appstore-card {
      display: block;
      width: 50%;
      max-width: 200px;
      margin: 0 0 10px 0;
      align-self: flex-start;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 6px 14px rgba(0, 0, 0, 0.38),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      background: #0a0a0a;
      aspect-ratio: 1024 / 406;
    }
    .lk-appstore-card:hover,
    .lk-appstore-card:active {
      transform: translateY(-1px);
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.12) inset;
    }
    .lk-appstore-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* ============================================================
       Limitless-Rating Card (1–10) — im Stil von results-score-hero
       ============================================================ */
    .lk-psl {
      position: relative;
      width: 100%;
      margin: 0 0 10px;
      padding: 4px 0 6px;
      background: transparent;
      box-shadow: none;
      overflow: visible;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    /* Halo hinter dem Gauge entfernt — nur noch der Arc & die Zahl leuchten aus sich heraus */
    .lk-psl > * { position: relative; z-index: 1; }
    .lk-psl::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1px;
      background: linear-gradient(135deg,
        rgba(175, 82, 222, 0.28),
        rgba(90, 200, 250, 0.22),
        rgba(99, 230, 190, 0.26));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    .lk-psl > * { position: relative; z-index: 1; }

    .lk-psl-head-label {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(60, 60, 67, 0.55);
      line-height: 1;
      margin-bottom: 4px;
    }

    /* Halbkreis-Gauge (180° Arc) */
    .lk-psl-gauge-wrap {
      position: relative;
      width: 180px;
      max-width: 100%;
      aspect-ratio: 200 / 116;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .lk-psl-gauge {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }
    .lk-psl-gauge-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 10;
      stroke-linecap: round;
    }
    .lk-psl-gauge-fill {
      fill: none;
      stroke: url(#psl-gauge-grad);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 258 258;
      stroke-dashoffset: 258;
      filter:
        drop-shadow(0 0 2px rgba(255, 253, 245, 0.9))
        drop-shadow(0 0 5px rgba(255, 220, 140, 0.7))
        drop-shadow(0 0 8px rgba(127, 208, 255, 0.45));
      transition: stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1), filter 0.3s ease;
    }

    /* Zahl zentriert im Gauge */
    .lk-psl-center {
      position: absolute;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      line-height: 1;
      pointer-events: none;
      isolation: isolate;
    }
    /* Backlight hinter der PSL-Zahl entfernt — nur Text-Glow */
    .lk-psl-num {
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
      background: none;
      -webkit-background-clip: initial;
              background-clip: initial;
      color: #ffffff;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      text-shadow:
        0 0 2px rgba(255, 253, 245, 0.95),
        0 0 5px rgba(255, 220, 140, 0.9),
        0 0 9px rgba(240, 193, 87, 0.65);
    }
    .lk-psl-num.tier-trueadam {
      background: linear-gradient(90deg, #ff2d55 0%, #ffcf6b 50%, #af52de 100%);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: none;
    }
    .lk-psl-denom {
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: -0.02em;
      text-shadow:
        0 0 2px rgba(255, 253, 245, 0.6),
        0 0 5px rgba(240, 193, 87, 0.4);
    }

    /* Tier-Label fett unter dem Gauge — Weiß mit warmem Gold-Halo auf Dark-BG */
    .lk-psl-tier-pill {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.18em;
      padding: 5px 16px;
      border-radius: 999px;
      line-height: 1;
      color: #ffffff;
      background: rgba(36, 30, 22, 0.7);
      border: 1px solid rgba(240, 193, 87, 0.55);
      box-shadow: none;
      white-space: nowrap;
      text-transform: uppercase;
      text-shadow:
        0 0 2px rgba(255, 253, 245, 0.6),
        0 0 5px rgba(255, 220, 140, 0.85),
        0 0 9px rgba(240, 193, 87, 0.55);
      transition: all 0.3s ease;
    }
    .lk-psl-tier-pill.tier-trueadam {
      background: linear-gradient(90deg, rgba(255, 45, 85, 0.14) 0%, rgba(175, 82, 222, 0.14) 100%);
      border-color: rgba(255, 45, 85, 0.4);
      color: #ff2d55;
      text-shadow: 0 0 10px rgba(255, 45, 85, 0.4);
    }

    /* Chad-Tier Stat-Grid: 6 offene Karten, kein Kasten */
    .lk-chad-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px 2px;
      width: 100%;
      background: transparent;
      border-radius: 0;
      padding: 2px 0 0;
      border: none;
      box-shadow: none;
      margin: 0 0 8px;
      row-gap: 10px;
    }

    .lk-chad-card {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 6px 8px 5px;
      min-width: 0;
      position: relative;
    }
    .lk-chad-label {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: rgba(235, 235, 245, 0.55);
      letter-spacing: -0.005em;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Zahlen-Rating pro Stat mit deutlich sichtbarem Hellblau-Halo */
    .lk-chad-score-row {
      position: relative;
      display: inline-flex;
      align-items: baseline;
      gap: 3px;
      line-height: 1;
      margin-top: 1px;
      isolation: isolate;
    }
    /* Backlight hinter den Stat-Zahlen entfernt — nur Text-Glow */
    .lk-chad-num {
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.035em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: #ffffff;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      text-shadow:
        0 0 2px rgba(255, 253, 245, 0.9),
        0 0 5px rgba(255, 220, 140, 0.9),
        0 0 9px rgba(240, 193, 87, 0.6);
    }
    .lk-chad-num.tier-trueadam {
      background: linear-gradient(90deg, #ff2d55 0%, #ffcf6b 50%, #af52de 100%);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      text-shadow: none;
    }
    .lk-chad-denom {
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: -0.01em;
      text-shadow: 0 0 3px rgba(240, 193, 87, 0.35);
    }
    .lk-chad-tier {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.1em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
      text-shadow:
        0 0 1.5px rgba(255, 253, 245, 0.65),
        0 0 4px   rgba(255, 220, 140, 0.8),
        0 0 7px   rgba(240, 193, 87, 0.5);
    }
    .lk-chad-tier.tier-trueadam {
      background: linear-gradient(90deg, #ff2d55 0%, #ffcf6b 50%, #af52de 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 5px rgba(255, 45, 85, 0.3));
      text-shadow: none;
    }
    .lk-chad-bar-wrap {
      height: 4px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 3px;
    }
    .lk-chad-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.45s ease, background 0.3s ease;
    }

    /* "Task: …" micro-Label unter jeder Chad-Card — Weiß mit warmem Gold-Halo */
    .lk-chad-task {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.1;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lk-chad-task-dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(60% 60% at 35% 30%, #fffef5 0%, #ffecaa 55%, #f0c157 100%);
      box-shadow:
        0 0 0 1px rgba(240, 193, 87, 0.55) inset,
        0 0 4px rgba(240, 193, 87, 0.7);
    }
    .lk-chad-task-name {
      font-weight: 800;
      color: #ffffff;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow:
        0 0 1.5px rgba(255, 253, 245, 0.6),
        0 0 4px   rgba(255, 220, 140, 0.8),
        0 0 7px   rgba(240, 193, 87, 0.45);
    }

    /* ============================================================
       Legacy .lk-* Klassen (.lk-card, .lk-head*, .lk-hero*, .lk-traj*,
       .lk-stats*, .lk-stat*, .lk-ring*, .lk-mission*) sind jetzt unused
       und werden vom Browser ignoriert — siehe unten für alte Regeln.
       ============================================================ */
    .lk-card_LEGACY_UNUSED::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(140deg, rgba(175, 82, 222, 0.22), rgba(0, 122, 255, 0.12) 45%, rgba(52, 199, 89, 0.24));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .lk-card > * { position: relative; z-index: 1; }

    /* Header: Icon + Looksmax + Range-Chip + Tier */
    .lk-head {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 2px 4px 10px;
    }
    .lk-head-icon {
      width: 15px;
      height: 15px;
      color: #ffcf6b;
      flex-shrink: 0;
    }
    .lk-head-title {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.005em;
      line-height: 1;
    }
    .lk-head-badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(235, 235, 245, 0.6);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .lk-head-spacer { flex: 1; }
    .lk-head-chip {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3.5px 8px;
      border-radius: 999px;
      color: #34c759;
      background: rgba(52, 199, 89, 0.16);
      line-height: 1;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
    }

    /* Hero: Score → Potential mit Chevron */
    .lk-hero {
      position: relative;
      border-radius: 16px;
      background:
        radial-gradient(120% 100% at 0% 0%, rgba(175, 82, 222, 0.1) 0%, transparent 55%),
        radial-gradient(120% 100% at 100% 100%, rgba(52, 199, 89, 0.12) 0%, transparent 55%),
        rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 10px 14px 12px;
      margin: 0 0 10px;
    }
    .lk-hero-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 6px;
    }
    .lk-hero-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .lk-hero-col--right { align-items: flex-end; text-align: right; }
    .lk-hero-label {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(235, 235, 245, 0.55);
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      line-height: 1;
    }
    .lk-hero-label.is-potential { color: rgba(52, 199, 89, 0.85); }
    .lk-hero-num {
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      font-size: 42px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.045em;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      display: block;
      min-height: 1em;
    }
    .lk-hero-num.is-gradient {
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lk-hero-chev {
      align-self: center;
      margin: 0 2px 8px;
      color: rgba(209, 173, 77, 0.55);
      flex-shrink: 0;
    }

    /* Trajectory bar: Now → Goal mit +Gap */
    .lk-traj { margin-top: 9px; }
    .lk-traj-track {
      position: relative;
      height: 10px;
    }
    .lk-traj-track::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }
    .lk-traj-fill {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 5px;
      border-radius: 999px;
      max-width: 100%;
      box-shadow: 0 0 10px rgba(255, 149, 0, 0.3);
    }
    .lk-traj-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(135deg, rgb(51, 199, 89), rgb(99, 230, 190)) border-box;
      border: 2px solid transparent;
      box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.15), 0 2px 6px rgba(52, 199, 89, 0.4);
    }
    .lk-traj-labels {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 10px;
      font-weight: 800;
      color: rgba(235, 235, 245, 0.55);
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      margin-top: 7px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .lk-traj-gap {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: -0.015em;
      text-transform: none;
      background: linear-gradient(92deg, #34c759 0%, #63e6be 60%, #63e6c0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding: 0 6px;
    }

    /* Stats grid: 6 Kategorien aus der App (Jawline, Symmetry, ...) */
    .lk-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
    }
    .lk-stat {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 7px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid rgba(255, 255, 255, 0.055);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      min-width: 0;
    }
    .lk-ring {
      position: relative;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .lk-ring svg { width: 32px; height: 32px; display: block; }
    .lk-ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .lk-stat-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }
    .lk-stat-name {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.005em;
      line-height: 1.1;
    }
    .lk-stat-tier {
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      align-self: flex-start;
      padding: 2px 5px;
      border-radius: 999px;
      line-height: 1;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
    }

    /* ============================================================
       MISSION STRIP — kompakte Task-Action: "Unlock Mission"
       ============================================================ */
    .lk-mission {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 12px 12px 12px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(209, 173, 77, 0.14) 0%, rgba(209, 173, 77, 0.04) 100%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 0 0 1px rgba(209, 173, 77, 0.26) inset,
        0 10px 24px rgba(209, 173, 77, 0.1);
      margin: 0 0 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .lk-mission-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lk-mission-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--cream-hex);
      display: block;
    }
    .lk-mission-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .lk-mission-eyebrow {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #d1ad4d;
      margin: 0;
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lk-mission-eyebrow .lk-mission-sec {
      color: rgba(235, 235, 245, 0.55);
      letter-spacing: 0.08em;
      font-weight: 800;
    }
    .lk-mission-eyebrow-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(209, 173, 77, 0.5);
      display: inline-block;
    }
    .lk-mission-title {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.035em;
      color: #ffffff;
      margin: 2px 0 0;
      line-height: 1.05;
    }
    .lk-mission-gains {
      display: flex;
      flex-wrap: wrap;
      gap: 0 10px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(235, 235, 245, 0.68);
      margin-top: 4px;
      line-height: 1.2;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      letter-spacing: -0.005em;
    }
    .lk-mission-gain { white-space: nowrap; display: inline-flex; align-items: baseline; gap: 3px; }
    .lk-mission-gain .gain-plus { color: #ffcf6b; font-weight: 900; font-size: 12px; }

    .lk-mission-play {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #f0c157 0%, #d1ad4d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(209, 173, 77, 0.38), 0 0 0 4px rgba(209, 173, 77, 0.08);
    }
    .lk-mission-play svg { width: 14px; height: 14px; color: #111; margin-left: 2px; display: block; }

    /* Shield-App-Footer entfernt — App-Store-Card über der Scan-Card erzählt die gleiche Story */


    @media (max-width: 640px) {
      .phone-mockup {
        transform: scale(calc((100vw - 32px) / 600));
        transform-origin: top center;
        margin-bottom: calc(-800px * (1 - (100vw - 32px) / 600));
      }
    }

    .shield-blur {
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
    }

    .shield-tint {
      position: absolute;
      inset: 0;
      background: transparent;
      opacity: 1;
      pointer-events: none;
    }

    /* Task-Thumbs werden jetzt in den Clipper-Controls gerendert; Styling dort */

    .shield-stack {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 4px var(--s-h-margin) 18px;
      min-height: 0;
    }

    /* Hero-Icon: typ. kompakte Shield-Größe auf dem Phone (~120–132pt) */
    .shield-icon-wrap {
      width: min(38vw, var(--s-icon-max));
      height: min(38vw, var(--s-icon-max));
      max-height: 18vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--s-gap-icon-title);
      background: linear-gradient(155deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border-radius: 22%;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.05) inset,
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .shield-icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      background-color: var(--cream-hex);
    }

    /* Wie fallback „Unlock Task“ + gewählter Task-Name (ShieldConfigurationExtension) */
    .shield-title-block {
      text-align: center;
      max-width: 300px;
      margin-bottom: var(--s-gap-title-sub);
    }

    .shield-title-unlock {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 4px;
      line-height: 1.2;
    }

    .shield-title-name {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: clamp(34px, 6.8vw, 42px);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 1;
      margin: 0;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* Untertitel: textSub */
    .shield-sub {
      font-size: clamp(14px, 3.8vw, 16px);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.35;
      text-align: center;
      color: var(--text-sub);
      max-width: 300px;
      padding: 0;
      margin-bottom: var(--s-gap-sub-btns);
    }

    .shield-buttons {
      width: 100%;
      max-width: 100%;
      padding: 0;
      margin-top: 0;
    }

    /* ============================================================
       LOCK BLOCK — iOS-natives Premium-Design
       Dünnes SF-Symbols-Lock-Glyph, klare Typografie, keine Effekte
       ============================================================ */
    .shield-lock-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin: 0 auto 14px;
      padding: 0;
      text-align: center;
    }

    .shield-lock-glyph {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      padding: 6px;
      border-radius: 10px;
      background: linear-gradient(160deg, rgba(255, 59, 48, 0.18), rgba(255, 59, 48, 0.08));
      box-shadow:
        0 0 0 1px rgba(255, 59, 48, 0.32) inset,
        0 6px 16px rgba(255, 59, 48, 0.15);
      width: 44px;
      height: 44px;
    }

    .shield-lock-glyph svg {
      width: 100%;
      height: 100%;
      stroke-width: 1.8;
      color: #ff6b75;
    }

    .shield-lock-headline {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #ffffff;
      margin: 0;
    }

    .shield-lock-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.4;
      color: rgba(235, 235, 245, 0.52);
      margin: 0;
      max-width: 280px;
    }

    .shield-lock-sub strong {
      color: #d1ad4d;
      font-weight: 700;
    }

    /* ============================================================
       TOP STATUS CHIP — "🔒 TikTok · Blocked" (subtil, nicht schreiend)
       ============================================================ */
    .shield-status-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 11px 5px 9px;
      border-radius: 999px;
      background: rgba(255, 69, 58, 0.1);
      border: 1px solid rgba(255, 69, 58, 0.28);
      color: #ff8b94;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(255, 69, 58, 0.15);
      margin: 0 auto 14px;
    }

    .shield-status-chip svg {
      width: 11px;
      height: 11px;
      stroke-width: 2.2;
    }

    .shield-status-chip strong {
      color: #ffb9bf;
      font-weight: 700;
    }

    /* ============================================================
       UNLOCK MISSION Eyebrow — dezent, gold
       ============================================================ */
    .shield-eyebrow {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #d1ad4d;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1;
    }

    .shield-eyebrow::before,
    .shield-eyebrow::after {
      content: '';
      width: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(209, 173, 77, 0.5), transparent);
    }

    /* ============================================================
       HERO AURA — Gold-Radial-Glow hinter dem Task-Icon
       ============================================================ */
    .shield-hero-aura {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      padding: 16px;
      isolation: isolate;
    }

    .shield-hero-aura::before {
      content: '';
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(closest-side, rgba(209, 173, 77, 0.38) 0%, rgba(209, 173, 77, 0.12) 40%, transparent 72%);
      filter: blur(6px);
      z-index: -1;
      animation: shield-aura-breathe 3.6s ease-in-out infinite;
    }

    @keyframes shield-aura-breathe {
      0%, 100% { opacity: 0.75; transform: scale(0.95); }
      50%      { opacity: 1;    transform: scale(1.05); }
    }

    @media (prefers-reduced-motion: reduce) {
      .shield-hero-aura::before { animation: none; }
    }

    /* ============================================================
       MISSION TITLE — riesiger Task-Name, gold „face workout"
       ============================================================ */
    .shield-mission-meta {
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #d1ad4d;
      margin: 6px auto 0;
      text-align: center;
      line-height: 1.2;
    }

    .shield-mission-meta-sep {
      color: rgba(209, 173, 77, 0.4);
      margin: 0 7px;
      font-weight: 400;
    }

    /* Dezenter App-Store-Footer im iOS-System-Stil (kein Button, nur Text) */
    .shield-appstore-footer {
      margin: 10px auto 0;
      padding: 0;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(235, 235, 245, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1;
    }
    .shield-appstore-footer-brand {
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.01em;
    }
    .shield-appstore-footer-sep {
      color: rgba(235, 235, 245, 0.25);
    }

    /**
     * Scan — wie ResultsView: rundes Foto, Score links, Potential rechts, KI via /api/face-analyze.
     */
    .shield-scan-wrap {
      width: 100%;
    }

    .shield-scan-wrap.is-analyzing .shield-scan-hit {
      pointer-events: none;
      opacity: 0.92;
    }

    .shield-scan-file {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .shield-scan-hit {
      display: block;
      width: 100%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .shield-scan-hit:active .shield-scan-mock:not(.is-analyzing-ui) {
      transform: scale(0.992);
    }

    /* Hero-Scan-Karte: gross, catchy, cream/gold — erzählt „Score jetzt → Potential" */
    .shield-scan-mock {
      position: relative;
      width: 100%;
      border-radius: 18px;
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.015) 100%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06) inset,
        0 0 0 1px rgba(255, 255, 255, 0.07) inset,
        0 8px 28px rgba(0, 0, 0, 0.45);
      border: none;
      transition: transform 0.12s ease, opacity 0.12s ease;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
    }

    .shield-scan-mock.is-analyzing-ui .shield-scan-avatar-inner {
      opacity: 0.65;
    }

    .shield-scan-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 14px 14px;
      min-height: 80px;
      text-align: center;
    }

    .shield-scan-empty[hidden] {
      display: none !important;
    }

    .shield-scan-placeholder-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--title);
    }

    .shield-scan-placeholder-hint {
      font-size: 11px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text-sub);
      max-width: 240px;
    }

    /* Rating-Karte: „Your Looksmax Path" — Now → Avatar → Potential */
    .shield-scan-filled {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 14px;
    }

    .shield-scan-caption {
      grid-column: 1 / -1;
      margin: 0 0 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #d1ad4d;
      text-align: center;
    }

    .shield-scan-filled[hidden] {
      display: none !important;
    }

    .shield-scan-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 0;
      gap: 2px;
    }

    .shield-scan-side--left  { text-align: center; }
    .shield-scan-side--right { text-align: center; }

    /* Dezente Richtungspfeile → erzählen „jetzt → Potential" (beide zeigen rechts) */
    .shield-scan-side::after {
      content: '';
      position: absolute;
      top: calc(50% + 4px);
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid rgba(209, 173, 77, 0.75);
      transform: translateY(-50%);
      opacity: 0.85;
      pointer-events: none;
      filter: drop-shadow(0 1px 2px rgba(209, 173, 77, 0.25));
    }
    .shield-scan-side--left::after  { right: -9px; }
    .shield-scan-side--right::after { left: -9px; }

    .shield-scan-avatar-row {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      flex-shrink: 0;
      position: relative;
    }

    /* Avatar-Ring: der Hero in der Mitte */
    .shield-scan-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      padding: 3.5px;
      box-sizing: border-box;
      filter:
        drop-shadow(0 6px 14px rgba(209, 173, 77, 0.28))
        drop-shadow(0 2px 6px rgba(0, 0, 0, 0.12));
      transition: background 0.35s ease;
    }

    .shield-scan-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18) inset;
      transition: opacity 0.2s ease;
    }

    .shield-scan-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* Score/Potential-Bereich: groß, bold, hero */
    .shield-scan-score-hero {
      flex: 1;
      min-width: 0;
      margin: 0;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      position: static;
    }

    .shield-scan-score-hero::before {
      display: none;
    }

    .shield-scan-sp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 0 8px;
    }

    .shield-scan-sp-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shield-scan-sp-right {
      text-align: right;
      align-items: flex-end;
      position: relative;
    }

    .shield-scan-sp-label {
      display: block;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(235, 235, 245, 0.52);
      margin-bottom: 2px;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
    }

    .shield-scan-sp-label.potential {
      color: #d1ad4d;
    }

    /* Score-Zahl: HUGE, bold — der Clipper sieht sie auf 1m Abstand */
    .shield-scan-sp-num {
      font-size: 34px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;
      display: block;
      min-height: 1em;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
    }

    .shield-scan-sp-num.is-gradient {
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-image: linear-gradient(135deg, #ff9500 0%, #d1ad4d 50%, #ff2d55 100%) !important;
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.5));
    }

    /* Delta-Badge über der Potential-Spalte — statisch, dezent, premium */
    .shield-scan-delta {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translate(-50%, -100%);
      padding: 2.5px 7px;
      border-radius: 999px;
      background: rgba(26, 26, 30, 0.92);
      color: #d1ad4d;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      white-space: nowrap;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      pointer-events: none;
      z-index: 3;
    }

    .shield-scan-delta[hidden] {
      display: none !important;
    }

    @media (prefers-reduced-motion: reduce) {
      .shield-scan-delta { animation: none; }
    }

    /* Arrow-Chevron zwischen Score + Potential: größer, Gold-Tint */
    .shield-scan-sp-chev {
      flex-shrink: 0;
      padding: 0;
      align-self: center;
      font-size: 28px;
      font-weight: 300;
      color: rgba(209, 173, 77, 0.7);
      line-height: 1;
      margin-top: 12px;
    }

    .shield-scan-traj {
      padding: 6px 0 0;
      position: relative;
      z-index: 1;
      grid-column: 1 / -1;
    }

    .shield-scan-status {
      grid-column: 1 / -1;
    }

    .shield-scan-traj[hidden] {
      display: none !important;
    }

    .shield-scan-traj-track {
      position: relative;
      height: 10px;
      margin-bottom: 0;
    }

    .shield-scan-traj-track::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      z-index: 0;
    }

    .shield-scan-traj-fill {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 5px;
      border-radius: 999px;
      max-width: 100%;
      z-index: 1;
      box-shadow: 0 0 12px rgba(209, 173, 77, 0.35);
    }

    .shield-scan-traj-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      z-index: 2;
      border-radius: 50%;
      box-sizing: border-box;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(135deg, rgb(51, 199, 89), rgb(89, 235, 166), rgb(99, 230, 190)) border-box;
      border: 2px solid transparent;
      box-shadow: 0 2px 6px rgba(51, 199, 89, 0.45), 0 0 0 3px rgba(51, 199, 89, 0.1);
    }

    /* App-Store-CTA-Slot: kompakt & oben im Shield */
    .shield-appstore-slot {
      position: relative;
      display: block;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      margin: 0 auto 12px;
      text-decoration: none;
      box-shadow:
        0 6px 16px rgba(0, 122, 255, 0.16),
        0 2px 5px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 122, 255, 0.2);
      background: #000;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* Kompakte Variante: schmaler Footprint, wirkt wie ein Pill-Banner */
    .shield-appstore-slot--compact {
      max-width: 260px;
      border-radius: 12px;
    }

    .shield-appstore-slot:hover,
    .shield-appstore-slot:active {
      transform: translateY(-1px);
      box-shadow:
        0 10px 22px rgba(0, 122, 255, 0.24),
        0 4px 10px rgba(0, 0, 0, 0.18);
    }

    .shield-appstore-slot img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* „Tap to install"-Puls-Dot oben rechts auf der Karte */
    .shield-appstore-pulse {
      position: absolute;
      top: 6px;
      right: 7px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px 2px 5px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
    }

    .shield-appstore-slot--compact .shield-appstore-pulse::before {
      width: 5px;
      height: 5px;
    }

    .shield-appstore-pulse::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.6);
      animation: shield-appstore-pulse 1.8s ease-out infinite;
    }

    @keyframes shield-appstore-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.6); }
      70%  { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
    }

    .shield-appstore-eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0 0 6px;
      font-size: 9.5px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(115, 115, 125, 0.9);
    }

    .shield-appstore-eyebrow .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
    }

    .shield-appstore-eyebrow .accent {
      color: var(--title);
      font-weight: 900;
    }

    @media (prefers-reduced-motion: reduce) {
      .shield-appstore-pulse::before { animation: none; }
    }

    .shield-scan-status {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-sub);
      text-align: center;
      padding: 0 12px 8px;
      margin: 0;
      min-height: 0;
    }

    .shield-scan-status:empty {
      padding: 0;
    }

    .shield-scan-source-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(0, 122, 255, 0.12);
      color: #007aff;
      margin: 0;
    }

    .shield-scan-source-badge.is-demo {
      background: rgba(255, 149, 0, 0.14);
      color: #c45c00;
    }

    /* Secondary: unter Primary, typ. ~12pt Abstand */
    .shield-secondary {
      display: block;
      width: 100%;
      margin-top: var(--s-gap-primary-secondary);
      appearance: none;
      border: none;
      background: none;
      color: var(--text-sub);
      font-family: inherit;
      font-size: 17px;
      font-weight: 400;
      padding: 8px 12px;
      min-height: 44px;
      cursor: pointer;
      text-align: center;
    }

    .shield-secondary:active {
      opacity: 0.55;
    }

    /* ============================================================
       ANALYZE-OVERLAY — 1:1 Face-Scan Loader aus der App
       (spiegelt AnalyzingOverlay.css)
       ============================================================ */
    .analyze-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #ffffff;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 48px;
      transition: opacity 0.38s ease;
    }
    .analyze-overlay[hidden] { display: none; }
    .analyze-overlay.is-fadeout { opacity: 0; pointer-events: none; }

    .analyze-inner {
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .analyze-limitless {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(112, 112, 120, 0.45);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .analyze-title {
      margin: 2px 0 0;
      font-size: 28px;
      font-weight: 900;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', ui-rounded, system-ui, sans-serif;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .analyze-frame-wrap {
      margin-top: 28px;
      filter: drop-shadow(0 12px 28px rgba(15, 23, 42, 0.12));
    }

    .analyze-scan-card {
      position: relative;
      width: 260px;
      height: 340px;
      border-radius: 28px;
      isolation: isolate;
    }

    .analyze-scan-card-border {
      position: absolute;
      inset: -3px;
      border-radius: 31px;
      background: linear-gradient(
        125deg,
        rgba(99, 102, 241, 0.85),
        rgba(168, 85, 247, 0.75),
        rgba(236, 72, 153, 0.7),
        rgba(99, 102, 241, 0.85)
      );
      background-size: 240% 240%;
      animation: analyze-border-flow 4s ease infinite;
      z-index: 0;
    }

    @keyframes analyze-border-flow {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .analyze-image-stack {
      position: absolute;
      inset: 3px;
      border-radius: 26px;
      overflow: hidden;
      z-index: 1;
      background: #1a1a1e;
    }

    .analyze-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .analyze-scan-fx {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      border-radius: inherit;
      overflow: hidden;
    }

    .analyze-scan-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 85% 75% at 50% 45%,
        transparent 0%,
        transparent 55%,
        rgba(0, 0, 0, 0.18) 100%
      );
    }

    .analyze-scan-sweep {
      position: absolute;
      left: 0;
      right: 0;
      height: 42%;
      top: -42%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255, 255, 255, 0.06) 35%,
        rgba(255, 255, 255, 0.22) 50%,
        rgba(255, 255, 255, 0.06) 65%,
        transparent 100%
      );
      animation: analyze-sweep-y 2.6s ease-in-out infinite;
    }

    @keyframes analyze-sweep-y {
      0%   { transform: translateY(0);    opacity: 0.35; }
      12%  { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translateY(340%); opacity: 0.35; }
    }

    .analyze-scan-shine {
      position: absolute;
      inset: -50%;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255, 255, 255, 0.04) 48%,
        rgba(255, 255, 255, 0.09) 50%,
        rgba(255, 255, 255, 0.04) 52%,
        transparent 60%
      );
      animation: analyze-shine-move 5.5s ease-in-out infinite;
    }

    @keyframes analyze-shine-move {
      0%   { transform: translate(-12%, -12%) rotate(0deg); }
      100% { transform: translate(12%, 12%) rotate(0deg); }
    }

    .analyze-pct {
      margin-top: 28px;
      font-size: 48px;
      font-weight: 900;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', ui-rounded, system-ui, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, rgba(0, 0, 0, 0.6) 100%);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      line-height: 1;
    }

    .analyze-step {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', ui-rounded, system-ui, sans-serif;
      color: rgba(112, 112, 120, 0.8);
      text-align: center;
      max-width: 280px;
      min-height: 2.5em;
      line-height: 1.35;
    }

    .analyze-bar-track {
      margin-top: 24px;
      width: calc(100% - 100px);
      max-width: 300px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .analyze-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6366f1 0%, rgba(168, 85, 247, 0.85) 50%, rgba(236, 72, 153, 0.75) 100%);
      transition: width 0.08s linear;
    }

    /* ============================================================
       EDIT-PANEL — Ratings + Foto bearbeiten (unter dem Handy)
       ============================================================ */
    .edit-panel {
      width: min(420px, calc(100% - 32px));
      margin: 24px auto 48px;
      padding: 16px 18px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(28, 29, 34, 0.92) 0%, rgba(20, 21, 26, 0.94) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 8px 18px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      color: rgba(235, 235, 245, 0.88);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    .edit-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .edit-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(235, 235, 245, 0.6);
    }
    .edit-reset {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(235, 235, 245, 0.78);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .edit-reset:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.22);
      color: #ffffff;
    }

    .edit-top-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .edit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      height: 40px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
    }
    .edit-btn:active { transform: scale(0.98); }
    .edit-btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, #0a84ff 0%, #5ac8fa 100%);
      box-shadow:
        0 6px 16px rgba(10, 132, 255, 0.4),
        0 2px 6px rgba(10, 132, 255, 0.25),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }
    .edit-btn-primary:hover {
      box-shadow:
        0 8px 20px rgba(10, 132, 255, 0.48),
        0 3px 8px rgba(10, 132, 255, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.14) inset;
    }
    .edit-btn-primary svg { display: block; }

    /* Overall-Rating inline, rechts neben dem Foto-CTA */
    .edit-overall-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .edit-overall-inline .edit-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(235, 235, 245, 0.6);
    }
    .edit-overall-inline .edit-denom {
      font-size: 11px;
      font-weight: 700;
      color: rgba(235, 235, 245, 0.4);
    }

    /* Sections: Task-Picker + Stats-Grid */
    .edit-section {
      margin-bottom: 10px;
    }
    .edit-section-label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(235, 235, 245, 0.55);
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .edit-task-strip {
      background: transparent;
      padding: 2px 0 6px;
    }
    .edit-task-strip::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
    }

    .edit-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin-bottom: 6px;
    }
    .edit-stat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 2px;
      background: transparent;
      border: none;
    }
    .edit-stat-label {
      flex: 1;
      font-size: 12px;
      font-weight: 700;
      color: rgba(235, 235, 245, 0.8);
      letter-spacing: -0.005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edit-stat .edit-denom {
      font-size: 11px;
      font-weight: 700;
      color: rgba(235, 235, 245, 0.4);
    }

    .edit-input {
      width: 56px;
      height: 32px;
      padding: 0 8px;
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      color: #ffffff;
      background: rgba(10, 132, 255, 0.08);
      border: 1px solid rgba(10, 132, 255, 0.28);
      border-radius: 8px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .edit-input::-webkit-outer-spin-button,
    .edit-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .edit-input::placeholder { color: rgba(235, 235, 245, 0.3); font-weight: 600; }
    .edit-input:focus {
      background: rgba(10, 132, 255, 0.14);
      border-color: rgba(10, 132, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.18);
    }
    .edit-input.edit-input-overridden {
      background: rgba(90, 200, 250, 0.12);
      border-color: rgba(90, 200, 250, 0.5);
    }

    .edit-stat .edit-input { width: 46px; height: 28px; font-size: 14px; }

    .edit-hint {
      margin: 4px 2px 0;
      font-size: 11px;
      line-height: 1.4;
      color: rgba(235, 235, 245, 0.42);
    }

  </style>
</head>
<body>
  <div class="stage">
    <!-- Clipper-Screenshot-Target: iPhone-Mockup mit Status-Bar & Dynamic Island -->
    <div class="phone-mockup" id="phone-mockup" aria-label="iPhone Mockup mit Limitless Shield">
      <div class="phone-screen">
        <div class="phone-island" aria-hidden="true"></div>
        <div class="phone-status-bar" aria-hidden="true">
          <span class="phone-time" id="phone-time">9:41</span>
          <div class="phone-icons">
            <!-- Signal bars -->
            <svg viewBox="0 0 18 12" width="18" height="12" aria-hidden="true">
              <rect x="0"  y="8" width="3" height="4"  rx="0.8" />
              <rect x="5"  y="6" width="3" height="6"  rx="0.8" />
              <rect x="10" y="3" width="3" height="9"  rx="0.8" />
              <rect x="15" y="0" width="3" height="12" rx="0.8" />
            </svg>
            <!-- Wi-Fi -->
            <svg viewBox="0 0 16 12" width="16" height="12" aria-hidden="true">
              <path d="M8 11.2a1.1 1.1 0 110-2.2 1.1 1.1 0 010 2.2zM3.6 7.4a6.3 6.3 0 018.8 0l-1.3 1.3a4.4 4.4 0 00-6.2 0L3.6 7.4zm-2.3-2.3a9.6 9.6 0 0113.4 0l-1.3 1.3a7.8 7.8 0 00-10.8 0L1.3 5.1z"/>
            </svg>
            <!-- Battery -->
            <span class="phone-battery" aria-hidden="true">
              <span class="phone-battery-fill"></span>
            </span>
          </div>
        </div>

        <div class="shield-root" id="shield-root">
          <div class="shield-tint" aria-hidden="true"></div>
          <div class="shield-blur" aria-hidden="true"></div>

          <div class="shield-stack">
            <!-- HERO ROW: Foto-Avatar links + Blocked-App + Unlock-Task rechts -->
            <input type="file" id="scan-file" class="shield-scan-file" accept="image/*" />
            <div class="lk-hero-row">
              <label for="scan-file" class="lk-avatar" id="lk-avatar" aria-label="Tap to scan face">
                <div class="lk-avatar-inner">
                  <img id="scan-preview-img" class="lk-avatar-img" alt="" />
                  <span class="lk-avatar-placeholder" id="lk-avatar-initials">L</span>
                </div>
                <span class="lk-avatar-hint" id="lk-avatar-hint">Tap · Scan</span>
              </label>
              <div class="lk-task-info">
                <!-- Blocked-App: großes Headline mit App-Icon -->
                <div class="lk-blocked">
                  <span class="lk-blocked-icon lk-tiktok-icon" id="blocked-app-icon" aria-hidden="true">
                    <svg viewBox="0 0 32 32" aria-hidden="true">
                      <!-- Cyan RGB-Offset -->
                      <path class="lk-tt-cyan" d="M21.5 5.5c.4 2.3 1.7 4.2 3.6 5.4 1 .6 2.1 1 3.3 1.1v3.8c-2.1 0-4-.5-5.7-1.5-1.1-.6-2-1.5-2.7-2.5v9.8c0 4.8-3.9 8.7-8.7 8.7S2.6 26.4 2.6 21.6s3.9-8.7 8.7-8.7c.5 0 1 0 1.4.1v4c-.5-.1-.9-.2-1.4-.2-2.6 0-4.8 2.1-4.8 4.8s2.1 4.8 4.8 4.8 4.8-2.1 4.8-4.8V5.5h5.4z"/>
                      <!-- Red/Magenta RGB-Offset -->
                      <path class="lk-tt-red" d="M21.5 5.5c.4 2.3 1.7 4.2 3.6 5.4 1 .6 2.1 1 3.3 1.1v3.8c-2.1 0-4-.5-5.7-1.5-1.1-.6-2-1.5-2.7-2.5v9.8c0 4.8-3.9 8.7-8.7 8.7S2.6 26.4 2.6 21.6s3.9-8.7 8.7-8.7c.5 0 1 0 1.4.1v4c-.5-.1-.9-.2-1.4-.2-2.6 0-4.8 2.1-4.8 4.8s2.1 4.8 4.8 4.8 4.8-2.1 4.8-4.8V5.5h5.4z"/>
                      <!-- Weißer Hauptpfad -->
                      <path class="lk-tt-white" d="M21.5 5.5c.4 2.3 1.7 4.2 3.6 5.4 1 .6 2.1 1 3.3 1.1v3.8c-2.1 0-4-.5-5.7-1.5-1.1-.6-2-1.5-2.7-2.5v9.8c0 4.8-3.9 8.7-8.7 8.7S2.6 26.4 2.6 21.6s3.9-8.7 8.7-8.7c.5 0 1 0 1.4.1v4c-.5-.1-.9-.2-1.4-.2-2.6 0-4.8 2.1-4.8 4.8s2.1 4.8 4.8 4.8 4.8-2.1 4.8-4.8V5.5h5.4z"/>
                    </svg>
